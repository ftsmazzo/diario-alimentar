{% extends "base.html" %}
{% block titulo %}Criar conta{% endblock %}
{% block conteudo %}
<div class="auth-caixa painel">
  <header class="pagina-cab" style="margin-bottom:12px">
    <div class="pagina-cab-texto">
      <h1>Criar conta</h1>
      <p class="pagina-sub">Pacientes precisam do código do nutricionista.</p>
    </div>
  </header>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="campo">
      <label>Tipo de conta</label>
      <div class="auth-tipo">
        <label>
          <input type="radio" name="tipo" value="paciente"
                 {% if form.get('tipo', 'paciente') == 'paciente' %}checked{% endif %}>
          <span>Sou paciente</span>
        </label>
        <label>
          <input type="radio" name="tipo" value="nutricionista"
                 {% if form.get('tipo') == 'nutricionista' %}checked{% endif %}>
          <span>Sou nutricionista</span>
        </label>
      </div>
    </div>

    <div class="campo">
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" required value="{{ form.get('nome','') }}">
    </div>
    <div class="campo">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" required value="{{ form.get('email','') }}">
    </div>
    <div class="campo">
      <label for="senha">Senha <span class="suave">(mínimo 8 caracteres)</span></label>
      <input type="password" id="senha" name="senha" minlength="8" required>
    </div>
    <div class="campo" id="campo-codigo-convite">
      <label for="codigo_convite">Código do nutricionista <span class="suave" id="codigo-obrigatorio">(obrigatório para pacientes)</span></label>
      <input type="text" id="codigo_convite" name="codigo_convite" maxlength="6"
             placeholder="Ex.: A7K2MX" value="{{ form.get('codigo_convite','') }}"
             style="text-transform:uppercase">
    </div>

    <div class="campo termo">
      <input type="checkbox" id="termos" name="termos" required>
      <label for="termos" style="font-weight:400">
        Autorizo o tratamento dos meus dados de saúde (alimentação, sono e
        exercícios) para acompanhamento nutricional, conforme a LGPD.
        Posso revogar este consentimento e solicitar a exclusão dos meus
        dados a qualquer momento.
      </label>
    </div>

    <button class="btn btn-primario" type="submit" style="width:100%">Criar conta</button>
  </form>
  <p class="suave" style="margin-top:14px">
    Já tem conta? <a href="{{ url_for('auth.login') }}">Entrar</a>
  </p>
</div>
{% endblock %}
