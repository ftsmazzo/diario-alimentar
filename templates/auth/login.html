{% extends "base.html" %}
{% block titulo %}Entrar{% endblock %}
{% block conteudo %}
<div class="auth-caixa painel">
  <header class="pagina-cab" style="margin-bottom:12px">
    <div class="pagina-cab-texto">
      <h1>Entrar</h1>
      <p class="pagina-sub">Acesse sua conta Pleno.</p>
    </div>
  </header>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="campo">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" required autofocus>
    </div>
    <div class="campo">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" required>
    </div>
    <div class="campo termo">
      <input type="checkbox" id="lembrar" name="lembrar">
      <label for="lembrar" style="font-weight:400">Manter conectado por 14 dias</label>
    </div>
    <button class="btn btn-primario" type="submit" style="width:100%">Entrar</button>
  </form>
  <p class="suave" style="margin-top:14px">
    Ainda não tem conta? <a href="{{ url_for('auth.registro') }}">Criar conta</a>
  </p>
</div>
{% endblock %}
